<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>编辑用户信息</title>
    <link rel="stylesheet" href="/lib/layui-v2.5.5/css/layui.css" media="all">
    <link rel="stylesheet" href="/css/public.css" media="all">
</head>
<body>
<!--用户基本信息-->
<fieldset class="layui-elem-field layui-field-title" style="margin-top: 20px;">
    <legend>用户基本信息</legend>
</fieldset>

<form class="layui-form layui-form-pane" action="" lay-filter="userInfo">

    <div class="layui-form-item">
        <label class="layui-form-label">用户名
            <span class="layui-badge-dot"></span>
        </label>
        <div class="layui-input-block">
            <input type="text" name="userName" id="ddd" lay-verify="required|userName" autocomplete="off"
                   placeholder="必填，请输入用户名，用户名长度应该为2-16个字符" class="layui-input">
        </div>
    </div>

    <div class="layui-form-item">
        <label class="layui-form-label">手机号
            <span class="layui-badge-dot"></span>
        </label>
        <div class="layui-input-block">
            <input type="text" name="phone" lay-verify="phone" autocomplete="off"
                   placeholder="请输入手机号" class="layui-input">
        </div>
    </div>

    <div class="layui-form-item">
        <label class="layui-form-label">密码
            <span class="layui-badge-dot"></span>
        </label>
        <div class="layui-input-block">
            <input type="text" name="password" lay-verify="password" autocomplete="off"
                   placeholder="必填，请输入密码，密码长度应该为6-64个字符" class="layui-input">
        </div>
    </div>

    <!-- 新增邮箱必填项 -->
    <div class="layui-form-item">
        <label class="layui-form-label">邮箱
            <span class="layui-badge-dot"></span>
        </label>
        <div class="layui-input-block">
            <input type="text" name="email" lay-verify="required|email" autocomplete="off"
                   placeholder="必填，请输入有效的邮箱地址" class="layui-input">
        </div>
    </div>

    <!-- 新增邮箱密码必填项 -->
    <div class="layui-form-item">
        <label class="layui-form-label">邮箱密码
            <span class="layui-badge-dot"></span>
        </label>
        <div class="layui-input-block">
            <input type="password" name="garminPassword" lay-verify="required|garminPassword" autocomplete="off"
                   placeholder="必填，请输入邮箱登录密码，长度6-64个字符" class="layui-input">
        </div>
    </div>

    <div class="layui-form-item">
        <div class="layui-inline">
            <label class="layui-form-label">用户角色</label>
            <div class="layui-input-inline">
                <input readonly="readonly" type="text" name="role" lay-verify="" autocomplete="off" class="layui-input">
            </div>
        </div>
        <div class="layui-inline">
            <label class="layui-form-label">权限</label>
            <div class="layui-input-inline">
                <input readonly="readonly" type="text" name="permission" lay-verify="" autocomplete="off" class="layui-input">
            </div>
        </div>
    </div>

    <div class="layui-form-item">
        <!--            组装行内表单 -->
        <div class="layui-inline">
            <label class="layui-form-label">真实姓名
            </label>
            <div class="layui-input-inline">
                <input type="text" name="realName" autocomplete="off"
                       placeholder="请输入用户真实姓名" class="layui-input">
            </div>
        </div>
        <div class="layui-inline">
            <label class="layui-form-label">身份证号</label>
            <div class="layui-input-inline">
                <input type="text" name="identityNumber" lay-verify="myidentity" autocomplete="off"
                       placeholder="请输入用户身份证号" class="layui-input">
            </div>
        </div>
    </div>

    <div class="layui-form-item" id="area-picker">
        <div class="layui-form-label">用户位置</div>
        <div class="layui-input-inline" style="width: 200px;">
            <select name="province" class="province-selector" data-value="" lay-filter="province-1">
                <option value="">请选择省</option>
            </select>
        </div>
        <div class="layui-input-inline" style="width: 200px;">
            <select name="city" class="city-selector" data-value="" lay-filter="city-1">
                <option value="">请选择市</option>
            </select>
        </div>
    </div>

    <div class="layui-form-item">
        <label class="layui-form-label">头像</label>
        <button type="button" class="layui-btn" id="upload">
            <i class="layui-icon">&#xe67c;</i>上传文件
        </button>
        <div class="layui-input-inline">
            <input type="text" name="avatar" id="avatorUrl" lay-verify="" autocomplete="off"
                   placeholder="未上传" class="layui-input">
        </div>

    </div>

    <!--        用户健康信息-->
    <fieldset class="layui-elem-field layui-field-title" style="margin-top: 20px;">
        <legend>用户健康信息</legend>
    </fieldset>


    <div class="layui-form-item">
        <div class="layui-inline">
            <label class="layui-form-label">性别</label>
            <div class="layui-input-block">
                <input type="radio" name="sex" value="男" title="男">
                <input type="radio" name="sex" value="女" title="女">
                <!--                <input type="radio" name="sex" value="禁" title="禁用" disabled="">-->
            </div>
        </div>

        <div class="layui-inline">
            <label class="layui-form-label">出生日期
            </label>
            <div class="layui-input-block">
                <input type="text" name="birthDate" id="date" lay-verify="date" placeholder="yyyy-MM-dd" autocomplete="off" class="layui-input">
            </div>
        </div>
    </div>

    <div class="layui-form-item">
        <div class="layui-inline">
            <label class="layui-form-label">身高</label>
            <div class="layui-input-inline">
                <input type="text" name="height" lay-verify="" autocomplete="off" placeholder="单位：厘米，整数" class="layui-input">
            </div>
            <label class="layui-text">cm</label>
        </div>
        <div class="layui-inline">
            <label class="layui-form-label">体重</label>
            <div class="layui-input-inline">
                <input type="text" name="weight" lay-verify="" autocomplete="off" placeholder="单位：kg，一位小数如60.1" class="layui-input">
            </div>
            <label class="layui-text">kg</label>
        </div>
    </div>

    <div class="layui-form-item">
        <label class="layui-form-label">抑郁程度</label>
        <div class="layui-input-block">
            <input type="text" name="depressed" lay-verify="" autocomplete="off" placeholder="抑郁程度标注" class="layui-input">
        </div>
    </div>

    <div class="layui-form-item layui-form-text">
        <label class="layui-form-label">备注信息</label>
        <div class="layui-input-block">
            <textarea name="remark" placeholder="请输入内容，可备注用户抑郁的详细情况" class="layui-textarea"></textarea>
        </div>
    </div>

    <!--        nwpu用户-->
    <fieldset class="layui-elem-field layui-field-title" style="margin-top: 20px;">
        <legend>NWPU用户信息</legend>
    </fieldset>

    <div class="layui-form-item">
        <label class="layui-form-label">nwpu用户</label>
        <div class="layui-input-block">
            <input type="radio" name="nwpu" value="0" title="否" checked="">
            <input type="radio" name="nwpu" value="1" title="是">
        </div>
    </div>

<!--    隐藏元素-->
    <div class="layui-form-item" hidden>
        <div class="layui-input-block">
            <button class="layui-btn" id="userInfoSubmit" lay-submit="" lay-filter="demo1">立即提交</button>
            <button type="reset" class="layui-btn layui-btn-primary">重置</button>
        </div>
    </div>
</form>


<script src="/lib/layui-v2.5.5/layui.js" charset="utf-8"></script>
<!--    区域选择器需要引入下面这一行-->
<script src="/js/lay-config.js?v=1.0.4" charset="utf-8"></script>
<!-- 引入myjs -->
<script src="/js/myjs/myscript.js"></script>

<script>
    // 先success回调，才会继续执行下面
    layui.use(['form', 'layedit', 'laydate', 'layarea', 'upload'], function () {
        var $ = layui.jquery
            , form = layui.form
            , layer = layui.layer
            , layedit = layui.layedit
            , laydate = layui.laydate
            , layarea = layui.layarea;

        //日期
        laydate.render({
            elem: '#date'
        });

        //区域选择器
        layarea.render({
            elem: '#area-picker',
            data: {
                province: '陕西省',
                city: '西安市'
            },
            change: function (res) {
                //选择结果
                // console.log(res);
            }
        });

        //自定义验证规则
        form.verify({
            userName: function (value) {
                if(!new RegExp("^[a-zA-Z0-9_\u4e00-\u9fa5\\s·]+$").test(value)){
                    return '用户名不能有特殊字符';
                }
                if(/^\d+\d+\d$/.test(value)){
                    return '用户名不能全为数字';
                }
                if (value.length < 2 || value.length > 16) {
                    return '用户名长度应该为2-16个字符';
                }
            }
            , password: function (value) {
                if (value.length < 6 || value.length > 64) {
                    return '密码长度应该为6-64个字符';
                }
            }
            // 新增邮箱密码验证规则
            , garminPassword: function (value) {
                if (value.length < 6 || value.length > 64) {
                    return '邮箱密码长度应该为6-64个字符';
                }
            }
            , content: function (value) {
                layedit.sync(editIndex);
            }
            , myidentity: function (value) {
                var code = value;
                //身份证号合法性验证
                //支持15位和18位身份证号
                //支持地址编码、出生日期、校验位验证
                var city={11:"北京",12:"天津",13:"河北",14:"山西",15:"内蒙古",21:"辽宁",22:"吉林",23:"黑龙江 ",31:"上海",32:"江苏",33:"浙江",34:"安徽",35:"福建",36:"江西",37:"山东",41:"河南",42:"湖北 ",43:"湖南",44:"广东",45:"广西",46:"海南",50:"重庆",51:"四川",52:"贵州",53:"云南",54:"西藏 ",61:"陕西",62:"甘肃",63:"青海",64:"宁夏",65:"新疆",71:"台湾",81:"香港",82:"澳门",91:"国外 "};
                var row = true;
                var msg = "验证成功";

                if(!code || !/^\d{6}(18|19|20)?\d{2}(0[1-9]|1[012])(0[1-9]|[12]\d|3[01])\d{3}(\d|[xX])$/.test(code)){
                    row=false,
                        msg = "身份证号格式错误";
                }else if(!city[code.substr(0,2)]){
                    row=false,
                        msg = "身份证号地址编码错误";
                }else{
                    //18位身份证需要验证最后一位校验位
                    if(code.length == 18){
                        code = code.split('');
                        //加权因子
                        var factor = [ 7, 9, 10, 5, 8, 4, 2, 1, 6, 3, 7, 9, 10, 5, 8, 4, 2 ];
                        //校验位
                        var parity = [ 1, 0, 'X', 9, 8, 7, 6, 5, 4, 3, 2 ];
                        var sum = 0;
                        var ai = 0;
                        var wi = 0;
                        for (var i = 0; i < 17; i++)
                        {
                            ai = code[i];
                            wi = factor[i];
                            sum += ai * wi;
                        }
                        if(parity[sum % 11] != code[17].toUpperCase()){
                            row=false,
                                msg = "身份证号校验位错误";
                        }
                    }
                }
                if(code == null || code == ''){

                }else if(!row) {
                    return msg;
                }
            }
        });

        //监听提交
        form.on('submit(demo1)', function (data) {
            // 数据处理

            // 身份证号只能是 null或者真实值
            if(data.field.identityNumber == ''){
                data.field.identityNumber = null;
            }
            // 特别处理
            if(data.field.province == '海外') {
                data.field.country = '海外';
            } else {
                data.field.country = '中国';
            }

            if(data.field.height == null || data.field.height == "") {
                data.field.height = 0
            }
            if(data.field.weight == null || data.field.weight == "") {
                data.field.weight = 0
            }
            // 新增邮箱字段处理（确保空值转为null）
            if(data.field.email == ''){
                data.field.email = null;
            }
            if(data.field.garminPassword == ''){
                data.field.garminPassword = null;
            }

            // 将新的值保存，间接传给父页面
            window.newFormData = data;
            return false;
        });

        //表单初始赋值
        form.val('userInfo', {
            // 默认填好的
            "role": "user"
            , "permission": "normal"
            , "password": "123456"
            , "sex": "女"
            , "nwpu": 1
        })

        // 上传文件
        var upload = layui.upload;
        var token = getToken();
        //执行实例
        var uploadInst = upload.render({
            elem: '#upload' //绑定元素
            ,url: '/upload/img' //上传接口
            ,headers: {Authorization: token}
            ,accept: 'file'
            ,done: function(res){
                $("#avatorUrl").val(res.result);
                //上传完毕回调
                // shiro 认证异常， 重新登陆
                if(res.code == 401) {
                    reLoginForShiroExecption();
                }
            }
            ,error: function(){
                //请求异常回调
            }
        });

    });
</script>

</body>
</html>
