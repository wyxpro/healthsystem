<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>编辑用户信息</title>
    <link rel="stylesheet" href="/lib/layui-v2.5.5/css/layui.css" media="all">
    <link rel="stylesheet" href="/css/public.css" media="all">
</head>
<body>
<!--用户基本信息-->
<fieldset class="layui-elem-field layui-field-title" style="margin-top: 20px;">
    <legend>用户基本信息</legend>
</fieldset>

<form class="layui-form layui-form-pane" action="" lay-filter="userInfo">

    <div class="layui-form-item">
        <div class="layui-inline">
            <label class="layui-form-label">用户Id</label>
            <div class="layui-input-inline">
                <input readonly="readonly" type="text" name="userId" lay-verify="" autocomplete="off"
                       placeholder="" class="layui-input">
            </div>
        </div>
        <div class="layui-inline">
            <label class="layui-form-label">用户名</label>
            <div class="layui-input-inline">
                <input readonly="readonly" type="text" name="userName" id="ddd" lay-verify="required|userName" autocomplete="off"
                       placeholder="必填，请输入用户名，用户名长度应该为2-16个字符" class="layui-input">
            </div>
        </div>
    </div>

    <div class="layui-form-item">
        <label class="layui-form-label">手机号</label>
        <div class="layui-input-inline">
            <input readonly="readonly" type="text" name="phone" lay-verify="required|phone" autocomplete="off"
                   placeholder="必填，请输入手机号" class="layui-input">
        </div>
    </div>

    <!--        <div class="layui-form-item">-->
    <!--            <label class="layui-form-label">密码</label>-->
    <!--            <div class="layui-input-block">-->
    <!--                <input type="text" name="password" lay-verify="password" autocomplete="off"-->
    <!--                       placeholder="必填，请输入密码，密码长度应该为6-64个字符" class="layui-input">-->
    <!--            </div>-->
    <!--        </div>-->

    <!--        <div class="layui-form-item">-->
    <!--            <div class="layui-inline">-->
    <!--                <label class="layui-form-label">用户角色</label>-->
    <!--                <div class="layui-input-inline">-->
    <!--                    <input readonly="readonly" type="text" name="role" lay-verify="" autocomplete="off" class="layui-input">-->
    <!--                </div>-->
    <!--            </div>-->
    <!--            <div class="layui-inline">-->
    <!--                <label class="layui-form-label">权限</label>-->
    <!--                <div class="layui-input-inline">-->
    <!--                    <input readonly="readonly" type="text" name="permission" lay-verify="" autocomplete="off" class="layui-input">-->
    <!--                </div>-->
    <!--            </div>-->
    <!--        </div>-->

    <div class="layui-form-item">
        <!--            组装行内表单 -->
        <div class="layui-inline">
            <label class="layui-form-label">真实姓名</label>
            <div class="layui-input-inline">
                <input readonly="readonly" type="text" name="realName" lay-verify="required" autocomplete="off"
                       placeholder="请输入用户真实姓名" class="layui-input">
            </div>
        </div>
        <div class="layui-inline">
            <label class="layui-form-label">身份证号</label>
            <div class="layui-input-inline">
                <input readonly="readonly" type="text" name="identity" lay-verify="identity" autocomplete="off"
                       placeholder="请输入用户身份证号" class="layui-input">
            </div>
        </div>
    </div>

    <div class="layui-form-item" id="area-picker">
        <div class="layui-form-label">用户位置</div>
        <div class="layui-input-inline" style="width: 200px;">
            <select readonly="readonly" name="province" class="province-selector" data-value="" lay-filter="province-1">
                <option value="">请选择省</option>
            </select>
        </div>
        <div class="layui-input-inline" style="width: 200px;">
            <select readonly="readonly" name="city" class="city-selector" data-value="" lay-filter="city-1">
                <option value="">请选择市</option>
            </select>
        </div>
        <!--            <div class="layui-input-inline" style="width: 200px;">-->
        <!--                <select name="county" class="county-selector" data-value="龙岗区" lay-filter="county-1">-->
        <!--                    <option value="">请选择区</option>-->
        <!--                </select>-->
        <!--            </div>-->
    </div>


    <div class="layui-form-item">
        <label class="layui-form-label">头像</label>
<!--        <button type="button" class="layui-btn" id="upload">-->
<!--            <i class="layui-icon">&#xe67c;</i>上传文件-->
<!--        </button>-->
        <div class="layui-input-inline">
            <input readonly="readonly" type="text" name="avatar" id="avatorUrl" lay-verify="" autocomplete="off"
                   placeholder="未上传" class="layui-input">
        </div>

    </div>


    <!--        用户健康信息-->
    <fieldset class="layui-elem-field layui-field-title" style="margin-top: 20px;">
        <legend>用户健康信息</legend>
    </fieldset>


    <div class="layui-form-item">
        <div class="layui-inline">
            <label class="layui-form-label">性别</label>
            <div class="layui-input-block">
                <input readonly="readonly" type="radio" name="sex" value="男" title="男">
                <input readonly="readonly" type="radio" name="sex" value="女" title="女">
                <!--                <input type="radio" name="sex" value="禁" title="禁用" disabled="">-->
            </div>
        </div>

        <div class="layui-inline">
            <label class="layui-form-label">出生日期</label>
            <div class="layui-input-block">
                <input readonly="readonly" type="text" name="date" id="date" lay-verify="" placeholder="yyyy-MM-dd" autocomplete="off" class="layui-input">
            </div>
        </div>
    </div>

    <div class="layui-form-item">
        <div class="layui-inline">
            <label class="layui-form-label">身高</label>
            <div class="layui-input-inline">
                <input readonly="readonly" type="text" name="height" lay-verify="" autocomplete="off" placeholder="单位：厘米，整数" class="layui-input">
            </div>
            <label class="layui-text">cm</label>
        </div>
        <div class="layui-inline">
            <label class="layui-form-label">体重</label>
            <div class="layui-input-inline">
                <input readonly="readonly" type="text" name="weight" lay-verify="" autocomplete="off" placeholder="单位：kg，一位小数如60.1" class="layui-input">
            </div>
            <label class="layui-text">kg</label>
        </div>
    </div>

    <!--        <div class="layui-form-item">-->
    <!--            <div class="layui-inline">-->
    <!--                <label class="layui-form-label">所属医生Id</label>-->
    <!--                <div class="layui-input-inline">-->
    <!--                    <input type="text" name="doctorId" lay-verify="" autocomplete="off" class="layui-input">-->
    <!--                </div>-->
    <!--            </div>-->
    <!--        </div>-->

    <div class="layui-form-item">
        <label class="layui-form-label">抑郁程度</label>
        <div class="layui-input-block">
            <input readonly="readonly" type="text" name="depressed" lay-verify="" autocomplete="off" placeholder="抑郁程度标注" class="layui-input">
        </div>
    </div>

    <div class="layui-form-item layui-form-text">
        <label class="layui-form-label">备注信息</label>
        <div class="layui-input-block">
            <textarea readonly="readonly" name="remark" placeholder="请输入内容，可备注用户抑郁的详细情况" class="layui-textarea"></textarea>
        </div>
    </div>



    <!--        nwpu用户-->
    <fieldset class="layui-elem-field layui-field-title" style="margin-top: 20px;">
        <legend>NWPU用户信息</legend>
    </fieldset>

    <div class="layui-form-item">
        <label class="layui-form-label">nwpu用户</label>
        <div class="layui-input-block">
            <input readonly="readonly" type="radio" name="nwpu" value="0" title="否" checked="">
            <input readonly="readonly" type="radio" name="nwpu" value="1" title="是">
        </div>
        <label class="layui-text">若选“否”可忽略以下选项</label>
        <!--            <div class="layui-input-block">-->
        <!--                <input type="checkbox" name="nwpu" lay-filter="isNwpu" lay-skin="switch" lay-text="是|否">-->
        <!--            </div>-->
    </div>

    <div class="layui-form-item">
        <div class="layui-inline">
            <label class="layui-form-label">学号</label>
            <div class="layui-input-inline">
                <input readonly="readonly" type="text" name="nwpuId" lay-verify="" autocomplete="off" class="layui-input">
            </div>
        </div>
        <div class="layui-inline">
            <label class="layui-form-label">学院</label>
            <div class="layui-input-inline">
                <input readonly="readonly" type="text" name="college" lay-verify="" autocomplete="off" class="layui-input">
            </div>
        </div>
    </div>

    <div class="layui-form-item">
        <div class="layui-inline">
            <label class="layui-form-label">年级</label>
            <div class="layui-input-inline">
                <input readonly="readonly" type="text" name="grade" lay-verify="" autocomplete="off" class="layui-input">
            </div>
        </div>
        <div class="layui-inline">
            <label class="layui-form-label">用户类型</label>
            <div readonly="readonly" class="layui-input-inline">
                <select name="type">
                    <option value="">请选择类型</option>
                    <optgroup label="学生">
                        <option value="本科生">本科生</option>
                        <option value="硕士生">硕士生</option>
                        <option value="博士生">博士生</option>
                    </optgroup>
                    <optgroup label="教职工">
                        <option value="教职工">教职工</option>
                    </optgroup>
                    <optgroup label="其他">
                        <option value="未知">未知</option>
                    </optgroup>
                </select>
            </div>
        </div>
    </div>

    <div class="layui-form-item" hidden>
        <div class="layui-input-block">
            <button class="layui-btn" lay-submit="" lay-filter="demo1">立即提交</button>
            <button type="reset" class="layui-btn layui-btn-primary">重置</button>
        </div>
    </div>
</form>


<script src="/lib/layui-v2.5.5/layui.js" charset="utf-8"></script>
<!--    区域选择器需要引入下面这一行-->
<script src="/js/lay-config.js?v=1.0.4" charset="utf-8"></script>
<!-- 引入myjs -->
<script src="/js/myjs/myscript.js"></script>

<script>
    // 先success回调，才会继续执行下面
    layui.use(['form', 'layedit', 'laydate', 'layarea', 'upload'], function () {
        var $ = layui.jquery
            , form = layui.form
            , layer = layui.layer
            , layedit = layui.layedit
            , laydate = layui.laydate
            , layarea = layui.layarea;

        var formData = window.parent.formData;

        //日期
        laydate.render({
            elem: '#date'
        });

        //区域选择器
        layarea.render({
            elem: '#area-picker',
            data: {
                province: formData.province,
                city: formData.city
                // county: '龙岗区',
            },
            change: function (res) {
                //选择结果
                console.log(res);
            }
        });

        //表单初始赋值
        form.val('userInfo', {
            "userId": formData.userId,
            "userName": formData.userName,
            "phone": formData.phone,
            "realName": formData.realName,
            "identity": formData.identityNumber,
            "avatar": formData.avatar,
            "sex": formData.sex,
            "date": formData.birthDate,
            "height": formData.height,
            "weight": formData.weight,
            "depressed": formData.depressed,
            "remark": formData.remark,
            "nwpu": formData.nwpu,    //开关状态
            "nwpuId": formData.nwpuId,
            "college": formData.college,
            "grade": formData.grade,
            "type": formData.type,
            // 这两行不能在这里初始化
            // "province": formData.province,
            // "city": formData.city

            //  这些不显示，不编辑
            // "role": "user"
            // , "permission": "normal"
            // , "password": "123456"
        })


    });
</script>

</body>
</html>
