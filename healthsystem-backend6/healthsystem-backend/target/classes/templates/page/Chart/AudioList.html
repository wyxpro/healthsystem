<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>录音列表</title>
    <meta name="renderer" content="webkit">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <link rel="stylesheet" href="/lib/layui-v2.5.5/css/layui.css" media="all">
    <link rel="stylesheet" href="/css/public.css" media="all">
</head>
<body>
<div class="layuimini-container">
    <div class="layuimini-main">


        <!--        数据表格 -->
        <table class="layui-hide" id="test" lay-filter="test"></table>

<!--                尾部工具栏-->
        <script type="text/html" id="barDemo">
            <a class="layui-btn layui-btn-normal layui-btn-xs" lay-event="detail">查看</a>
            <a class="layui-btn layui-btn-warm layui-btn-xs" lay-event="edit">标注</a>
        </script>

    </div>
</div>
<!-- 引入layui -->
<script src="/lib/layui-v2.5.5/layui.js" charset="utf-8"></script>
<!-- 引入myjs -->
<script src="/js/myjs/myscript.js"></script>
<script>
    layui.use(['form', 'table'], function () {
        var $ = layui.jquery,
            form = layui.form,
            table = layui.table;

        userId = parent.userInfo.userId;
        console.log(userId)
        // 先检查是否登录，token是否过期，若是，跳转登录
        let token = getToken();
        if(null == token) {
            reLoginForShiroExecption()
        }


        //温馨提示：默认由前端自动合计当前行数据。从 layui 2.5.6 开始： 若接口直接返回了合计行数据，则优先读取接口合计行数据。
        //详见：https://www.layui.com/doc/modules/table.html#totalRow
        var tableIns = table.render({
            elem: '#test'
            // 接口地址。默认会自动传递两个参数：?page=1&limit=30（该参数可通过 request 自定义）
            ,url: "/doctor/getspeakanytimelist?userId="+userId
            ,method: 'GET'
            ,toolbar: '#toolbarDemo'
            ,even: true //开启隔行背景
            // 导出文件名
            ,title: '录音记录表'
            ,totalRow: true
            ,limits: [10, 15, 20, 30, 40, 50]
            ,limit: 10
            // 用于对分页请求的参数：page、limit重新设定名称
            ,request: {
                pageName: 'currentPage' //页码的参数名称，默认：page
                ,limitName: 'pageSize' //每页数据量的参数名，默认：limit
            }
            ,headers: {
                Authorization: token
            }
            // // 数据格式解析的回调函数，用于将返回的任意数据格式解析成 table 组件规定的数据格式。
            ,parseData: function(res){ //res 即为原始返回的数据
                if(res.code == 401) {
                    return {
                        "code": res.code, //解析接口状态
                        "msg": res.message, //解析提示文本
                    };
                }
                return {
                    "code": 0, //解析接口状态
                    "msg": res.message, //解析提示文本
                    "count": res.result.pageInfo.totalNumber, //解析数据长度
                    "data": res.result.data //解析数据列表
                };
            }
            // done - 数据渲染完的回调.无论是异步请求数据，还是直接赋值数据，都会触发该回调。
            ,done: function(res){
                console.log("下面为返回结果");
                console.log(res);
                console.log("上面为返回结果");
                // shiro 认证异常， 重新登陆
                if(res.code == 401) {
                    reLoginForShiroExecption();
                }
            }
            ,error: function (res) {
                if(res.code == 401) {
                    reLoginForShiroExecption();
                }
            }
            ,cols: [
                [
                    {type: 'checkbox', fixed: 'left'}
                    // ,{field: 'id', title: '序号', width: 60}
                    ,{field: 'userId', title: 'ID', width: 60,align:'center'}
                    ,{field: 'logDate', title: '日期', width: 120, sort: true,align:'center'}
                    ,{field: 'logTime', title: '时间', width: 120,align:'center'}
                    ,{ title: '文件操作', templet:function (d){
                        return '<a href="../audio_play.html?audioUrl='+d.speechUrl+'" class="layui-table-link"><i class="layui-icon" style="color: #1e9fff ">&#xe652;</i>播放</a>'
                        // return '<a href="../file.html"  class="layui-table-link"><i class="layui-icon" style="color: #1e9fff ">&#xe652;</i>播放</a>'
                    }, width: 150,align:'center'},
                    // layui-icon-download-circle <button type="button" class="layui-btn layui-btn-normal layui-btn-sm" id="download" ><i class="layui-icon" style="color: #1e9fff ">&#xe601;</i>下载</button>
                ]
            ]
            ,page: true
        });
    });
</script>

</body>
</html>
