<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>修改密码</title>
    <meta name="renderer" content="webkit">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <link rel="stylesheet" href="/lib/layui-v2.5.5/css/layui.css" media="all">
    <link rel="stylesheet" href="/css/public.css" media="all">
    <style>
        .layui-form-item .layui-input-company {width: auto;padding-right: 10px;line-height: 38px;}
    </style>
</head>
<body>
<div class="layuimini-container">
    <div class="layuimini-main">

        <div class="layui-form layuimini-form">
            <div class="layui-form-item">
                <label class="layui-form-label required">旧的密码</label>
                <div class="layui-input-block">
                    <input type="password" name="old_password" lay-verify="required" lay-reqtext="旧的密码不能为空" placeholder="请输入旧的密码"  value="" class="layui-input">
                    <tip>填写自己账号的旧的密码。</tip>
                </div>
            </div>

            <div class="layui-form-item">
                <label class="layui-form-label required">新的密码</label>
                <div class="layui-input-block">
                    <input type="password" name="new_password" lay-verify="required" lay-reqtext="新的密码不能为空" placeholder="请输入新的密码"  value="" class="layui-input">
                </div>
            </div>
            <div class="layui-form-item">
                <label class="layui-form-label required">新的密码</label>
                <div class="layui-input-block">
                    <input type="password" name="again_password" lay-verify="required" lay-reqtext="新的密码不能为空" placeholder="请输入新的密码"  value="" class="layui-input">
                </div>
            </div>

            <div class="layui-form-item">
                <div class="layui-input-block">
                    <button class="layui-btn layui-btn-normal" lay-submit lay-filter="saveBtn">确认保存</button>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="/lib/layui-v2.5.5/layui.js" charset="utf-8"></script>
<script src="/js/lay-config.js?v=1.0.4" charset="utf-8"></script>
<!-- 引入myjs -->
<script src="/js/myjs/myscript.js"></script>
<script>
    layui.use(['form','miniTab'], function () {
        var $ = layui.jquery,
            form = layui.form,
            layer = layui.layer,
            miniTab = layui.miniTab;

        // 先检查是否登录，token是否过期，若是，跳转登录
        let token = getToken();
        if(null == token) {
            reLoginForShiroExecption()
        }

        //监听提交
        form.on('submit(saveBtn)', function (data) {
            // var index = layer.alert(JSON.stringify(data.field), {
            //     title: '最终的提交信息'
            // }, function () {
            //     layer.close(index);
            //     miniTab.deleteCurrentByIframe();
            // });


            console.log(data.field);
            if(data.field.new_password == data.field.again_password) {
                // 两个新密码一致
                // 通过ajxa发送更新密码请求
                $.ajax({
                    type: "post",
                    dataType: "json",
                    url: "/user/updatePassword",
                    contentType: "application/json;charset=UTF-8",//指定消息请求类型
                    data: JSON.stringify({
                            "newPassword": data.field.new_password,
                            "oldPassword": data.field.old_password
                    }),//将js对象转成json对象
                    headers: {
                        Authorization: token
                    },
                    success: function (data,status) {
                        // 本来success是200-300 &304 的， 但是名字不是status似乎不行
                        if(data.code == 200) {
                            layer.msg('修改成功', {
                                time: 1000
                            },function () {
                                miniTab.deleteCurrentByIframe();
                            })
                        } else if(data.code == 401) {
                            reLoginForShiroExecption();
                        } else if(data.code == 400) {
                            layer.alert(data.result + '   <br>请重试');
                        }
                    },
                    // 处理异常情况，不过一般没有，有就是有bug
                    error: function (data, status) {
                        console.log(data);
                        data = data.responseJSON;
                        // 未知错误
                        layer.alert('错误代码：' + data.code + '==>' + data.message + '<br>请联系后台管理员');
                    }
                });
            } else {
                layer.tips('两个新密码不一致', '.layui-layer-btn0', {
                        tips: [1, '#0FA6D8']
                        ,zIndex: layer.zIndex
                    }
                );
            }


            return false;
        });

    });
</script>
</body>
</html>
