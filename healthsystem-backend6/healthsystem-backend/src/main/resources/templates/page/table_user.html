<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>layui</title>
    <meta name="renderer" content="webkit">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <link rel="stylesheet" href="/lib/layui-v2.5.5/css/layui.css" media="all">
    <link rel="stylesheet" href="/css/public.css" media="all">
</head>

<body>
<div class="layuimini-container">
    <div class="layuimini-main">

        <fieldset class="table-search-fieldset">
            <legend>搜索信息</legend>
            <div style="margin: 10px 10px 10px 10px">
                <form class="layui-form layui-form-pane" action="">
                    <div class="layui-form-item">
<!--                        组装行内表单 -->
                        <div class="layui-inline">
                            <label class="layui-form-label">用户名</label>
                            <div class="layui-input-inline">
                                <input type="text" name="userName" autocomplete="off" class="layui-input">
                            </div>
                        </div>
<!--                        end 组装行内表单-->
                        <div class="layui-inline">
                            <label class="layui-form-label">用户真实姓名</label>
                            <div class="layui-input-inline">
                                <input type="text" name="realName" autocomplete="off" class="layui-input">
                            </div>
                        </div>
                        <div class="layui-inline">
                            <label class="layui-form-label">用户性别</label>
                            <div class="layui-input-inline">
                                <input type="text" name="sex" autocomplete="off" class="layui-input">
                            </div>
                        </div>
<!--                        提交按钮  -->
                        <div class="layui-inline">
                            <button type="submit" class="layui-btn layui-btn-primary"  lay-submit lay-filter="data-search-btn"><i class="layui-icon"></i> 搜 索</button>
                        </div>
                    </div>
                </form>
            </div>
        </fieldset>

<!--        数据表格 -->
        <table class="layui-hide" id="test" lay-filter="test"></table>

<!--        头部工具栏 -->
        <script type="text/html" id="toolbarDemo">
            <div class="layui-btn-container">
                <button class="layui-btn layui-btn-sm" lay-event="insertUser">添加新用户</button>
                <button class="layui-btn layui-btn-sm" id="mark-btn" lay-event="markUsers">批量标注用户</button>
                <button class="layui-btn layui-btn-sm" lay-event="getCheckLength">获取选中数目</button>
            </div>
        </script>

<!--        尾部工具栏-->
        <script type="text/html" id="barDemo">
            <a class="layui-btn layui-btn-normal layui-btn-xs" lay-event="detail">查看</a>
            <a class="layui-btn layui-btn-xs" lay-event="edit">编辑</a>
<!--            <a class="layui-btn layui-btn-danger layui-btn-xs" lay-event="delete">删除</a>-->
        </script>

    </div>
</div>
<!-- 引入layui -->
<script src="/lib/layui-v2.5.5/layui.js" charset="utf-8"></script>
<!-- 引入myjs -->
<script src="/js/myjs/myscript.js"></script>
<script>
    layui.use(['form', 'table'], function () {
        var $ = layui.jquery,
            form = layui.form,
            table = layui.table;

        // 先检查是否登录，token是否过期，若是，跳转登录
        let token = getToken();
        if(null == token) {
            reLoginForShiroExecption()
        }

        //温馨提示：默认由前端自动合计当前行数据。从 layui 2.5.6 开始： 若接口直接返回了合计行数据，则优先读取接口合计行数据。
        //详见：https://www.layui.com/doc/modules/table.html#totalRow
        var tableIns = table.render({
            elem: '#test'
            // 接口地址。默认会自动传递两个参数：?page=1&limit=30（该参数可通过 request 自定义）
            ,url: '/doctor/getuserlist'
            ,method: 'GET'
            ,toolbar: '#toolbarDemo'
            // 导出文件名
            ,title: '用户数据表'
            ,totalRow: true
            ,limits: [10, 15, 20, 30, 40, 50]
            ,limit: 15
            // 用于对分页请求的参数：page、limit重新设定名称
            ,request: {
                pageName: 'currentPage' //页码的参数名称，默认：page
                ,limitName: 'pageSize' //每页数据量的参数名，默认：limit
            }
            // 接口的请求头
            ,headers: {
                Authorization: token
            }
            // // 数据格式解析的回调函数，用于将返回的任意数据格式解析成 table 组件规定的数据格式。
            ,parseData: function(res){ //res 即为原始返回的数据
                if(res.code == 401) {
                    return {
                        "code": res.code, //解析接口状态
                        "msg": res.message, //解析提示文本
                    };
                }

                return {
                    "code": res.code, //解析接口状态
                    "msg": res.message, //解析提示文本
                    "count": res.result.pageInfo.totalNumber, //解析数据长度
                    "data": res.result.data //解析数据列表
                };
            }
            // done - 数据渲染完的回调.无论是异步请求数据，还是直接赋值数据，都会触发该回调。
            ,done: function(res){
                // shiro 认证异常， 重新登陆
                if(res.code == 401) {
                    reLoginForShiroExecption();
                }
            }
            ,error: function (res) {
                if(res.code == 401) {
                    reLoginForShiroExecption();
                }
            }
            ,cols: [
                [
                    {type: 'checkbox', fixed: 'left'}
                    ,{field:'realName', title:'姓名', width:100, sort: true, fixed: 'left', totalRowText: '合计'}
                    ,{field:'userId', title:'ID', width:60, unresize: true, sort: true}
                    ,{field:'phone', title:'手机号', width:120, sort: true}
                    ,{field:'userName', title:'用户名', width:120, sort: true}
                    ,{field:'email', title:'邮箱', width:180, sort:true}
                    ,{field:'identityNumber', title:'身份证号', width:180, sort: true}
                    ,{field:'city', title:'城市', width:80}
                    ,{field:'province', title:'省份', width:80}
                    ,{field:'country', title:'国家', width:60}
                    ,{field:'sex', title:'性别', width:60}
                    ,{field:'birthDate', title:'生日', width:120, sort: true}
                    ,{field:'height', title:'身高', width:80, sort: true}
                    ,{field:'weight', title:'体重', width:80, sort: true}
                    ,{field:'depressed', title:'抑郁程度标注', event: 'setSign', width:120, sort: true}
                    ,{field:'remark', title:'备注', width:120, event: 'setSign', sort: true}
                    ,{field:'nwpu', title:'是否nwpu用户', width:60, sort: true, totalRow: true}
                    ,{field:'nwpuId', title:'学号', width:120, sort: true}
                    ,{field:'college', title:'学院/单位', width:120, sort: true}
                    ,{field:'grade', title:'年级', width:80, sort: true}
                    ,{field:'type', title:'用户类型', width:80, sort: true}
                    ,{field:'avatar', title:'头像', width:120}
                    ,{field:'addTimestampMils', title:'注册时间', width:120, sort: true}
                    ,{field:'modTimestampMils', title:'修改时间', width:120, sort: true}
                    ,{fixed: 'right', title:'操作', toolbar: '#barDemo', width: 160}
                ]
            ]
            ,page: true
        });

        // 监听搜索操作
        form.on('submit(data-search-btn)', function (data) {

            //执行搜索重载
            table.reload('test', {
                page: {
                    curr: 1
                }
                , where: {
                    userName: data.field.userName,
                    realName: data.field.realName,
                    sex: data.field.sex,
                    phone: data.field.phone
                }
            }, 'data');
            return false;
        });

        /**
         * toolbar监听事件
         */
        //工具栏事件
        table.on('toolbar(test)', function(obj){
            var checkStatus = table.checkStatus(obj.config.id);
            switch(obj.event){
                case 'insertUser':
                    layer.open({
                        type: 2,
                        title : '添加新用户',
                        area: ['680px', '800px'],
                        fixed: false, //不固定
                        maxmin: true,
                        shadeClose : true, // 点击遮罩关闭
                        btn : ['保存','取消'],
                        content: 'form/userinfo-add.html',
                        //当你需要在层创建完毕时即执行一些语句，可以通过该回调。success会携带两个参数，分别是当前层DOM当前层索引。
                        success: function(layero, index){

                        },
                        yes: function (index, layero) {
                            // 点击提交，首先获取数据，获取完数据可以在子页面更新，当然也可以在父页面更新，但是在父页面更新更方便点
                            var body = layer.getChildFrame('body', index);
                            // 找到隐藏的提交按钮模拟点击提交，也就是子页面提交数据
                            let click = body.find('#userInfoSubmit').click();
                            // 通过 iframeWin 获取子页面数据
                            var iframeWin = window[layero.find('iframe')[0]['name']];

                            // console.log(iframeWin.newFormData);

                            $.ajax({
                                type: "post",
                                dataType: "json",
                                url: "/doctor/addNewUser",
                                contentType: "application/json;charset=UTF-8",//指定消息请求类型
                                data: JSON.stringify(
                                    // 子页面的数据
                                    iframeWin.newFormData.field
                                ),//将js对象转成json对象
                                headers: {
                                    Authorization: token
                                },
                                success: function (data,status) {
                                    // 本来success是200-300 &304 的， 但是名字不是status似乎不行
                                    if(data.code == 200) {
                                        // 更新数据
                                        tableIns.reload({});
                                        //进行手工关闭 ，子窗口
                                        layer.close(index);
                                        layer.msg('添加成功', {
                                            time: 2000
                                        },function () {

                                        })
                                    } else if(data.code == 401) {
                                        reLoginForShiroExecption();
                                    } else if(data.code == 400) {
                                        // console.log(data);
                                        //还有 身份证号占用等等情况，提示
                                        layer.alert(data.result + '   <br>请重试');
                                    }
                                },
                                // 处理异常情况，不过一般没有，有就是有bug
                                error: function (data, status) {
                                    console.log(data);
                                    data = data.responseJSON;
                                    // 未知错误
                                    layer.alert('错误代码：' + data.code + '==>' + data.message + '<br>请联系后台管理员');
                                }
                            });
                        }
                    });
                    break;
                case 'markUsers':
                    var data = checkStatus.data;
                    if(data.length == 0) {
                        layer.tips('请先勾选用户，再进行标注!', '#mark-btn', {
                                tips: [1, '#0FA6D8'] //还可配置颜色
                                ,zIndex: layer.zIndex
                                ,time: 1500
                            });
                        break;
                    }
                    // myscript.js
                    markUser(data, token, tableIns, $);

                    break;
                case 'getCheckLength':
                    var data = checkStatus.data;
                    layer.msg('选中了：'+ data.length + ' 个');
                    break;
            };
        });

        //监听工具条
        //监听单元格事件
        table.on('tool(test)', function(obj){
            var data = obj.data;
            // console.log(obj)
            if(obj.event === 'detail'){
                layer.open({
                    type: 2,
                    title : '用户【' + data.realName +'】的信息',
                    area: ['700px', '800px'],
                    fixed: false, //不固定
                    maxmin: true,
                    shadeClose : true, // 点击遮罩关闭
                    btn : ['关闭'],
                    content: 'form/userinfo.html',
                    //当你需要在层创建完毕时即执行一些语句，可以通过该回调。success会携带两个参数，分别是当前层DOM当前层索引。
                    success: function(layero, index){
                        window.formData = obj.data;
                    }
                });
            } else if(obj.event === 'edit'){
                // iframe层-父子操作
                layer.open({
                    type: 2,
                    title : '编辑用户【' + data.realName +'】的信息',
                    area: ['700px', '800px'],
                    fixed: false, //不固定
                    maxmin: true,
                    shadeClose : true, // 点击遮罩关闭
                    btn : ['保存','取消'],
                    content: 'form/userinfo-edit.html',
                    //当你需要在层创建完毕时即执行一些语句，可以通过该回调。success会携带两个参数，分别是当前层DOM当前层索引。
                    success: function(layero, index){
                        var body = layer.getChildFrame('body', index);
                        var iframeWin = window[layero.find('iframe')[0]['name']]; //得到iframe页的窗口对象，执行iframe页的方法：iframeWin.method();
                        window.formData = obj.data;
                    },
                    yes: function (index, layero) {
                        // 点击提交，首先获取数据，获取完数据可以在子页面更新，当然也可以在父页面更新，但是在父页面更新更方便点
                        var body = layer.getChildFrame('body', index);
                        // 找到隐藏的提交按钮模拟点击提交，也就是子页面提交数据
                        let click = body.find('#userInfoSubmit').click();
                        // 通过 iframeWin 获取子页面数据
                        var iframeWin = window[layero.find('iframe')[0]['name']];

                        $.ajax({
                            type: "post",
                            dataType: "json",
                            url: "/doctor/updateUserInfo",
                            contentType: "application/json;charset=UTF-8",//指定消息请求类型
                            data: JSON.stringify(
                                // 子页面的数据
                                iframeWin.newFormData.field
                            ),//将js对象转成json对象
                            headers: {
                                Authorization: token
                            },
                            success: function (data,status) {
                                // 本来success是200-300 &304 的， 但是名字不是status似乎不行
                                if(data.code == 200) {
                                    // 更新数据
                                    obj.update({
                                        userId: data.result.userId,
                                        userName: data.result.userName,
                                        phone: data.result.phone,
                                        realName: data.result.realName,
                                        identityNumber: data.result.identityNumber,
                                        province: data.result.province,
                                        city: data.result.city,
                                        avatar: data.result.avatar,
                                        sex: data.result.sex,
                                        birthDate: data.result.birthDate,
                                        height: data.result.height,
                                        weight: data.result.weight,
                                        depressed: data.result.depressed,
                                        remark: data.result.remark,
                                        nwpu: data.result.nwpu,
                                        nwpuId: data.result.nwpuId,
                                        college: data.result.college,
                                        grade: data.result.grade,
                                        type: data.result.type
                                    });
                                    //进行手工关闭 ，子窗口
                                    layer.close(index);
                                    layer.msg('更新成功', {
                                        time: 1000
                                    },function () {

                                    })
                                } else if(data.code == 401) {
                                    reLoginForShiroExecption();
                                } else if(data.code == 400) {
                                    // console.log(data);
                                    //还有 身份证号占用等等情况，提示
                                    layer.alert(data.result + '   <br>请重试');
                                }
                            },
                            // 处理异常情况，不过一般没有，有就是有bug
                            error: function (data, status) {
                                data = data.responseJSON;
                                // 未知错误
                                layer.alert('错误代码：' + data.code + '==>' + data.message + ', 请联系后台管理员');
                            }
                        });
                    }
                });
            } else if(obj.event === 'setSign'){
                editDepressed(data, token, obj, $);
            }
        });
    });
</script>
</body>
</html>
