<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>layui</title>
    <meta name="renderer" content="webkit">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <link rel="stylesheet" href="/lib/layui-v2.5.5/css/layui.css" media="all">
    <link rel="stylesheet" href="/css/public.css" media="all">
</head>
<body>
<div class="layuimini-container">
    <div class="layuimini-main">

        <fieldset class="table-search-fieldset">
            <legend>搜索信息</legend>
            <div style="margin: 10px 10px 10px 10px">
                <!--                给表单体系所在的父元素加上class="layui-form" -->
                <!-- 提示：如果你不想用form，你可以换成div等任何一个普通元素 -->
                <form class="layui-form layui-form-pane" action="">
                    <!--  layui-form-item-->
                    <div class="layui-form-item">
                        <!--                        组装行内表单 -->
                        <div class="layui-inline">
                            <label class="layui-form-label">用户名</label>
                            <div class="layui-input-inline">
                                <input type="text" name="userName" autocomplete="off" class="layui-input">
                            </div>
                        </div>
                        <!--                        end 组装行内表单-->
                        <div class="layui-inline">
                            <label class="layui-form-label">用户真实姓名</label>
                            <div class="layui-input-inline">
                                <input type="text" name="realName" autocomplete="off" class="layui-input">
                            </div>
                        </div>
                        <div class="layui-inline">
                            <label class="layui-form-label">用户性别</label>
                            <div class="layui-input-inline">
                                <input type="text" name="sex" autocomplete="off" class="layui-input">
                            </div>
                        </div>
                        <!--                        提交按钮  -->
                        <div class="layui-inline">
                            <button type="submit" class="layui-btn layui-btn-primary"  lay-submit lay-filter="data-search-btn"><i class="layui-icon"></i> 搜 索</button>
                        </div>
                    </div>
                </form>
            </div>
        </fieldset>

        <!--        数据表格 -->
        <table class="layui-hide" id="test" lay-filter="test"></table>

        <!--        头部工具栏 -->
        <script type="text/html" id="toolbarDemo">
            <div class="layui-btn-container">
                <button class="layui-btn layui-btn-sm" id="mark-btn" lay-event="markUsers">批量标注用户</button>
            </div>
        </script>

        <!--        尾部工具栏-->
        <script type="text/html" id="barDemo">
            <a class="layui-btn layui-btn-normal layui-btn-xs" lay-event="detail">查看</a>
            <a class="layui-btn layui-btn-warm layui-btn-xs" lay-event="edit">标注</a>
        </script>

    </div>
</div>
<!-- 引入layui -->
<script src="/lib/layui-v2.5.5/layui.js" charset="utf-8"></script>
<!-- 引入myjs -->
<script src="/js/myjs/myscript.js"></script>
<script>
    layui.use(['form', 'table'], function () {
        var $ = layui.jquery,
            form = layui.form,
            table = layui.table;

        // 先检查是否登录，token是否过期，若是，跳转登录
        let token = getToken();
        if(null == token) {
            reLoginForShiroExecption()
        }

        //温馨提示：默认由前端自动合计当前行数据。从 layui 2.5.6 开始： 若接口直接返回了合计行数据，则优先读取接口合计行数据。
        //详见：https://www.layui.com/doc/modules/table.html#totalRow
        var tableIns = table.render({
            elem: '#test'
            // 接口地址。默认会自动传递两个参数：?page=1&limit=30（该参数可通过 request 自定义）
            ,url: '/doctor/getuserlist'
            ,method: 'GET'
            ,toolbar: '#toolbarDemo'
            ,even: true //开启隔行背景
            // 导出文件名
            ,title: '用户数据表'
            ,totalRow: true
            ,limits: [10, 15, 20, 30, 40, 50]
            ,limit: 15
            // 用于对分页请求的参数：page、limit重新设定名称
            ,request: {
                pageName: 'currentPage' //页码的参数名称，默认：page
                ,limitName: 'pageSize' //每页数据量的参数名，默认：limit
            }
            // 接口的其它参数
            // ,where: {
            //     doctorId: 1
            // }
            // 接口的请求头
            ,headers: {
                Authorization: token
            }
            // // 数据格式解析的回调函数，用于将返回的任意数据格式解析成 table 组件规定的数据格式。
            ,parseData: function(res){ //res 即为原始返回的数据
                // console.log(res);
                // 401 shiro
                if(res.code == 401) {
                    return {
                        "code": res.code, //解析接口状态
                        "msg": res.message, //解析提示文本
                    };
                }

                return {
                    "code": res.code, //解析接口状态
                    "msg": res.message, //解析提示文本
                    "count": res.result.pageInfo.totalNumber, //解析数据长度
                    "data": res.result.data //解析数据列表
                };
            }
            // done - 数据渲染完的回调.无论是异步请求数据，还是直接赋值数据，都会触发该回调。
            ,done: function(res){
                console.log('11111111');
                console.log(res);
                console.log('11111111');
                // shiro 认证异常， 重新登陆
                if(res.code == 401) {
                    reLoginForShiroExecption();
                }
            }
            ,error: function (res) {
                if(res.code == 401) {
                    reLoginForShiroExecption();
                }
            }
            ,cols: [
                [
                    {type: 'checkbox', fixed: 'left'}
                    ,{field:'realName', title:'姓名', width:100, sort: true, fixed: 'left', totalRowText: '合计'}
                    ,{field:'userId', title:'ID', width:60, unresize: true, sort: true}
                    ,{field:'phone', title:'手机号', width:120, sort: true}
                    ,{field:'userName', title:'用户名', width:120, sort: true}
                    ,{field:'identityNumber', title:'身份证号', width:180, sort: true}
                    ,{field:'city', title:'城市', width:80}
                    ,{field:'province', title:'省份', width:80}
                    ,{field:'country', title:'国家', width:60}
                    ,{field:'sex', title:'性别', width:60}
                    ,{field:'birthDate', title:'生日', width:120, sort: true}
                    ,{field:'height', title:'身高', width:80, sort: true}
                    ,{field:'weight', title:'体重', width:80, sort: true}
                    ,{field:'depressed', title:'抑郁程度标注', event: 'setSign', width:120, sort: true}
                    ,{field:'remark', title:'备注', width:120, event: 'setSign', sort: true}
                    ,{field:'nwpu', title:'是否nwpu用户', width:60, sort: true, totalRow: true}
                    ,{field:'nwpuId', title:'学号', width:120, sort: true}
                    ,{field:'college', title:'学院/单位', width:120, sort: true}
                    ,{field:'grade', title:'年级', width:80, sort: true}
                    ,{field:'type', title:'用户类型', width:80, sort: true}
                    ,{field:'avatar', title:'头像', width:120}
                    ,{field:'addTimestampMils', title:'注册时间', width:120, sort: true}
                    ,{field:'modTimestampMils', title:'修改时间', width:120, sort: true}
                    ,{fixed: 'right', title:'操作', toolbar: '#barDemo', width:120}
                ]
            ]
            ,page: true
        });

        // 监听搜索操作
        form.on('submit(data-search-btn)', function (data) {
            // var result = JSON.stringify(data.field);
            // layer.alert(result, {
            //     title: '最终的搜索信息'
            // });

            // console.log(data)

            //执行搜索重载
            table.reload('test', {
                page: {
                    curr: 1
                }
                , where: {
                    userName: data.field.userName,
                    realName: data.field.realName,
                    sex: data.field.sex,
                    phone: data.field.phone
                }
            }, 'data');

            return false;
        });

        /**
         * toolbar监听事件
         */
        //工具栏事件
        table.on('toolbar(test)', function(obj){
            var checkStatus = table.checkStatus(obj.config.id);
            switch(obj.event){
                case 'markUsers':
                    var data = checkStatus.data;
                    if(data.length == 0) {
                        layer.tips('请先勾选用户，再进行标注!', '#mark-btn', {
                            tips: [1, '#0FA6D8'] //还可配置颜色
                            ,zIndex: layer.zIndex
                            ,time: 1500
                        });
                        break;
                    }
                    // myscript.js
                    markUser(data, token, tableIns, $);
                    break;
            };
        });

        //监听工具条
        //监听单元格事件
        table.on('tool(test)', function(obj){
            var data = obj.data;
            if(obj.event === 'detail'){
                var that = this;
                // 默认打开时 为根页面
                isRoot = true;
                // 保存数据，便于传输数据给子页面
                userInfo = obj.data;
                // 多窗口模式，层叠置顶
                layer.open({
                    type: 2 //此处以iframe举例
                    , title: ' 用户【'+ data.userName +'】的健康情况记录'
                    // , area: ['390px', '660px']
                    , area: ['660px', '660px']
                    , maxmin: true
                    , fixed: false //不固定
                    ,shadeClose : true // 点击遮罩关闭
                    // , content: 'https://www.baidu.com/'
                    , content: 'Chart/ChartHealth.html'
                    , btn: ['返回',  '关闭']
                    , btn1: function () {
                        if(isRoot) {
                            // do nothing
                            layer.tips('已经是根页面了，不能再返回了!', '.layui-layer-btn0', {
                                    tips: [1, '#0FA6D8'] //还可配置颜色
                                    ,zIndex: layer.zIndex
                                }
                            );
                        } else {
                            window.history.go(-1);//返回上一页不刷新
                        }
                    }
                    , btn2: function () {
                        layer.closeAll();
                    }
                    // , zIndex: 998 //重点1
                    , zIndex: layer.zIndex //重点1
                    , success: function (layero, index) {
                        // layer.setTop(layero); //重点2
                        // console.log('zIndex:' + layer.zIndex);
                        var body = layer.getChildFrame('body', index);
                        // 找到隐藏的div 来判断是否根页面
                        let click = body.find('#isChartMain');
                        if(click.length == 1) {
                            console.log('root');
                            isRoot = true;
                        }else {
                            console.log('not root');
                            isRoot = false;
                        }
                    }
                });
            }else if(obj.event === 'edit'){
                // myscript.js
                // 点击编辑按钮进行修改
                editDepressed(data, token, obj, $);
            } else if(obj.event === 'setSign'){
                // myscript.js
                // 点击表格中来修改
                editDepressed(data, token, obj, $);
            }
        });


    });



</script>

</body>
</html>
